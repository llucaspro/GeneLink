<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canal · GeneLink</title>
<link rel="icon" type="image/svg+xml" href="/gl/static/favicon.svg">
<link rel="stylesheet" href="/gl/static/css/main.css">
<style>
.chat-layout { display:grid; grid-template-columns:1fr; height:calc(100vh - 56px); }
.chat-container { display:flex; flex-direction:column; height:calc(100vh - 56px - 80px); }
.chat-header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:10px; }
.chat-header-hash { font-size:1.3rem; color:var(--primary-light); }
.chat-header-name { font-size:1rem; font-weight:700; }
.chat-messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
.msg { display:flex; gap:10px; align-items:flex-start; }
.msg-avatar { width:34px; height:34px; border-radius:50%; background:var(--accent); color:#fff; display:grid; place-items:center; font-size:.75rem; font-weight:700; flex-shrink:0; margin-top:2px; }
.msg-body { flex:1; }
.msg-header { display:flex; align-items:baseline; gap:8px; margin-bottom:2px; }
.msg-username { font-size:.85rem; font-weight:700; color:var(--primary); }
.msg-time { font-size:.75rem; color:var(--text-light); }
.msg-text { font-size:.9rem; line-height:1.6; }
.verified-badge { font-size:.65rem; background:#e3f2fd; color:#1565c0; border:1px solid #90caf9; border-radius:20px; padding:1px 6px; font-weight:700; vertical-align:middle; }
.chat-input-bar { background:var(--surface); border-top:1px solid var(--border); padding:12px 20px; display:flex; gap:10px; }
.chat-input-bar input { flex:1; }
.access-denied { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:12px; text-align:center; }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div id="access-denied-msg" class="access-denied" style="display:none">
  <div style="font-size:2rem">🔒</div>
  <h2>Canal Restrito</h2>
  <p style="color:var(--text-muted)">Este canal é exclusivo para membros da instituição.</p>
  <a href="/gl/institucional" class="btn btn-primary">Ver Instituições</a>
</div>

<div id="chat-layout" style="display:none">
  <div class="chat-header">
    <span class="chat-header-hash">#</span>
    <div>
      <div class="chat-header-name" id="channel-name">Canal</div>
      <div style="font-size:.78rem;color:var(--text-muted)" id="channel-inst"></div>
    </div>
    <div style="margin-left:auto">
      <a id="back-link" href="/gl/canais" class="btn btn-ghost btn-sm">← Canais</a>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="loading-state"><div class="spinner spinner-dark"></div></div>
  </div>

  <div class="chat-input-bar">
    <input type="text" id="msg-input" class="form-control" placeholder="Enviar mensagem…" maxlength="2000" onkeydown="onKey(event)">
    <button class="btn btn-primary" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script src="/gl/static/js/api.js"></script>
<script>
const channelId = parseInt(window.location.pathname.split("/").pop());
let page = 1;

document.addEventListener("DOMContentLoaded", async () => {
  requireAuth();
  injectNavbar("/canais");
  loadMessages();
});

async function loadMessages() {
  try {
    const res = await apiFetch(`/channels/${channelId}/messages?page=${page}`);
    if (res.status === 403) {
      document.getElementById("access-denied-msg").style.display = "flex";
      return;
    }
    document.getElementById("chat-layout").style.display = "block";
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Erro");
    renderMessages(data.messages || []);
  } catch (e) {
    if (e.message !== "Não autorizado") {
      document.getElementById("chat-messages").innerHTML = `<div style="color:var(--danger)">Erro: ${e.message}</div>`;
      document.getElementById("chat-layout").style.display = "block";
    }
  }
}

function renderMessages(messages) {
  const el = document.getElementById("chat-messages");
  if (!messages.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">#</div><p>Nenhuma mensagem ainda. Seja o primeiro!</p></div>`;
    return;
  }
  el.innerHTML = messages.map(m => `
    <div class="msg">
      <div class="msg-avatar">${m.avatar_initials || m.username.slice(0,2).toUpperCase()}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-username">${m.username}</span>
          ${m.is_verified ? `<span class="verified-badge">✓ verificado</span>` : ""}
          <span class="msg-time">${formatDateTime(m.created_at)}</span>
        </div>
        <div class="msg-text">${escapeHtml(m.content)}</div>
      </div>
    </div>
  `).join("");
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const content = input.value.trim();
  if (!content) return;
  input.value = "";
  try {
    const res = await apiFetch(`/channels/${channelId}/messages`, {
      method: "POST",
      body: JSON.stringify({ content }),
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || "Erro ao enviar"); return; }
    const el = document.getElementById("chat-messages");
    const user = getUser();
    el.innerHTML += `
      <div class="msg">
        <div class="msg-avatar">${user.avatar_initials || user.username.slice(0,2).toUpperCase()}</div>
        <div class="msg-body">
          <div class="msg-header">
            <span class="msg-username">${user.username}</span>
            <span class="msg-time">agora mesmo</span>
          </div>
          <div class="msg-text">${escapeHtml(content)}</div>
        </div>
      </div>`;
    el.scrollTop = el.scrollHeight;
  } catch (e) {
    alert("Erro de conexão");
  }
}
</script>
</body>
</html>
