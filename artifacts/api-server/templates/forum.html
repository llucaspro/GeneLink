<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fórum Científico · GeneLink</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/css/main.css">
<style>
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-box {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  width: 100%;
  max-width: 580px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-body { padding: 24px; }
.close-btn {
  background: none; border: none; font-size: 1.4rem;
  cursor: pointer; color: var(--text-muted); line-height: 1;
}
</style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="container page-content">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap">
    <div>
      <h1 style="font-size:1.6rem;font-weight:700;color:var(--primary)">Fórum da Comunidade Científica</h1>
      <p style="color:var(--text-muted);margin-top:4px;font-size:.9rem">Discuta pesquisas, compartilhe descobertas e colabore com a comunidade.</p>
    </div>
    <button class="btn btn-accent" onclick="openNewPostModal()">+ Nova Publicação</button>
  </div>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
    <label class="form-label" style="margin:0">Filtrar por categoria:</label>
    <select id="filter-category" class="form-control" style="width:auto;min-width:200px">
      <option value="">Todas as Categorias</option>
    </select>
  </div>

  <div class="card">
    <div id="posts-list">
      <div class="loading-state"><div class="spinner spinner-dark"></div></div>
    </div>
  </div>
</div>

<!-- Modal Nova Publicação -->
<div class="modal-overlay" id="new-post-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 style="font-size:1.05rem">Criar Nova Publicação</h3>
      <button class="close-btn" onclick="closeNewPostModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="post-alert" class="alert"></div>
      <form id="new-post-form">
        <div class="form-group">
          <label class="form-label">Título <span style="color:var(--danger)">*</span></label>
          <input type="text" id="post-title" class="form-control" placeholder="Título descritivo para sua publicação" required>
        </div>
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select id="post-category" class="form-control">
            <option value="Geral">Geral</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Conteúdo <span style="color:var(--danger)">*</span></label>
          <textarea id="post-content" class="form-control" rows="7" placeholder="Compartilhe suas descobertas, dúvidas ou discussão científica…" required></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button type="button" class="btn btn-ghost" onclick="closeNewPostModal()">Cancelar</button>
          <button type="submit" id="submit-post-btn" class="btn btn-accent">Publicar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/forum.js"></script>
</body>
</html>
