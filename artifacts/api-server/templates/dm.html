<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensagens Privadas · GeneLink</title>
<link rel="icon" type="image/svg+xml" href="/gl/static/favicon.svg">
<link rel="stylesheet" href="/gl/static/css/main.css">
<style>
.dm-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: calc(100vh - 56px);
  overflow: hidden;
}
@media(max-width:720px) {
  .dm-layout { grid-template-columns: 1fr; }
  .dm-sidebar { display: none; }
  .dm-sidebar.active { display: flex; }
  .dm-main.hidden { display: none; }
}
/* ── Sidebar de conversas ── */
.dm-sidebar {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
}
.dm-sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.dm-sidebar-header h2 { font-size: .95rem; font-weight: 700; color: var(--primary); margin: 0; }
.dm-conv-list { overflow-y: auto; flex: 1; }
.dm-conv-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  border-bottom: 1px solid #f1f5f9;
  transition: background .15s;
  text-decoration: none;
  color: inherit;
}
.dm-conv-item:hover, .dm-conv-item.active { background: #eef4fb; }
.dm-conv-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: grid; place-items: center;
  font-size: .85rem; font-weight: 700;
  flex-shrink: 0;
}
.dm-conv-info { flex: 1; overflow: hidden; }
.dm-conv-name { font-weight: 600; font-size: .88rem; color: var(--primary); }
.dm-conv-preview {
  font-size: .78rem; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 180px;
}
.dm-badge {
  background: var(--accent); color: #fff;
  border-radius: 20px; font-size: .68rem;
  font-weight: 700; padding: 1px 7px; flex-shrink: 0;
}
.dm-empty-conv {
  text-align: center; color: var(--text-muted);
  font-size: .85rem; padding: 32px 16px; line-height: 1.7;
}
/* ── Área principal de chat ── */
.dm-main {
  display: flex;
  flex-direction: column;
  background: var(--surface-alt);
  overflow: hidden;
}
.dm-header {
  padding: 12px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.dm-header-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: grid; place-items: center;
  font-size: .8rem; font-weight: 700;
}
.dm-header-name { font-weight: 700; color: var(--primary); font-size: .95rem; }
.dm-header-sub  { font-size: .75rem; color: var(--text-muted); }
.dm-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.dm-welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; text-align: center;
  color: var(--text-muted); padding: 40px;
}
.dm-welcome-icon { font-size: 3.5rem; margin-bottom: 16px; }
.dm-welcome h3 { font-size: 1.1rem; color: var(--primary); margin-bottom: 8px; }
.dm-bubble-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.dm-bubble-wrap.mine { flex-direction: row-reverse; }
.dm-bubble-av {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: grid; place-items: center;
  font-size: .65rem; font-weight: 700;
  flex-shrink: 0;
}
.dm-bubble {
  max-width: 68%;
  padding: 9px 13px;
  border-radius: 16px;
  font-size: .875rem;
  line-height: 1.5;
  word-break: break-word;
}
.dm-bubble.them {
  background: #fff;
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.dm-bubble.mine {
  background: var(--primary);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.dm-bubble-time {
  font-size: .68rem;
  color: var(--text-light);
  margin-top: 3px;
  text-align: right;
}
.dm-bubble.mine .dm-bubble-time { color: rgba(255,255,255,.65); }
.dm-flagged-note {
  font-size: .7rem;
  color: #f59e0b;
  margin-top: 2px;
}
/* ── Input ── */
.dm-input-bar {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.dm-input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 10px 16px;
  font-size: .9rem;
  outline: none;
  font-family: var(--font);
  resize: none;
  max-height: 120px;
  line-height: 1.5;
}
.dm-input:focus { border-color: var(--primary-light); }
.dm-send-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--primary); color: #fff;
  border: none; cursor: pointer; font-size: 1.1rem;
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: opacity .15s;
}
.dm-send-btn:hover { opacity: .85; }
.dm-send-btn:disabled { opacity: .4; cursor: not-allowed; }
/* ── Spinner ── */
.dm-loading { text-align: center; color: var(--text-muted); font-size: .85rem; padding: 24px; }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="dm-layout">
  <!-- Sidebar: lista de conversas -->
  <aside class="dm-sidebar" id="dm-sidebar">
    <div class="dm-sidebar-header">
      <h2>💬 Mensagens</h2>
      <span id="dm-unread-badge" style="display:none" class="dm-badge">0</span>
    </div>
    <div class="dm-conv-list" id="dm-conv-list">
      <div class="dm-loading">Carregando conversas…</div>
    </div>
  </aside>

  <!-- Área principal -->
  <main class="dm-main" id="dm-main">
    <div class="dm-welcome" id="dm-welcome">
      <div class="dm-welcome-icon">💌</div>
      <h3>Suas mensagens privadas</h3>
      <p style="font-size:.88rem;max-width:320px">Selecione uma conversa ao lado ou acesse o perfil de um pesquisador e clique em <strong>Enviar Mensagem</strong> para começar.</p>
    </div>

    <!-- Cabeçalho do chat (oculto até selecionar conversa) -->
    <div class="dm-header" id="dm-header" style="display:none">
      <div class="dm-header-avatar" id="dm-hd-av"></div>
      <div>
        <div class="dm-header-name" id="dm-hd-name"></div>
        <div class="dm-header-sub" id="dm-hd-sub"></div>
      </div>
      <a id="dm-profile-link" href="#" style="margin-left:auto;font-size:.78rem;color:var(--primary-light)">Ver perfil →</a>
    </div>

    <!-- Mensagens -->
    <div class="dm-messages" id="dm-messages" style="display:none"></div>

    <!-- Input -->
    <div class="dm-input-bar" id="dm-input-bar" style="display:none">
      <textarea class="dm-input" id="dm-input" placeholder="Escreva uma mensagem…" rows="1" maxlength="3000"></textarea>
      <button class="dm-send-btn" id="dm-send-btn" title="Enviar">➤</button>
    </div>
  </main>
</div>

<script src="/gl/static/js/api.js"></script>
<script src="/gl/static/js/dm.js"></script>
</body>
</html>
