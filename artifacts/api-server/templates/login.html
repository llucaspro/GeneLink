<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · GeneLink</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/css/main.css">
<style>
body { background:var(--surface-alt); display:flex; flex-direction:column; min-height:100vh; }
.auth-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 16px; }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); width:100%; max-width:440px; overflow:hidden; }
.auth-header { background:var(--primary); color:#fff; padding:28px 32px 24px; }
.auth-header .brand { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.auth-header .brand-icon { width:32px; height:32px; background:var(--accent); border-radius:6px; display:grid; place-items:center; font-weight:800; font-size:.9rem; }
.auth-header h1 { font-size:1.35rem; font-weight:700; }
.auth-header p { color:rgba(255,255,255,.75); font-size:.85rem; margin-top:4px; }
.tab-bar { display:flex; border-bottom:1px solid var(--border); }
.tab-btn { flex:1; padding:13px; font-size:.88rem; font-weight:600; font-family:var(--font); border:none; background:var(--surface); color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); background:#fff; }
.auth-body { padding:28px 32px 32px; }
.divider-line { display:flex; align-items:center; gap:12px; color:var(--text-light); font-size:.8rem; margin:16px 0; }
.divider-line::before, .divider-line::after { content:''; flex:1; height:1px; background:var(--border); }
.social-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:10px; border:1px solid var(--border); border-radius:var(--radius); font-size:.875rem; font-weight:600; font-family:var(--font); cursor:pointer; background:var(--surface); color:var(--text); transition:background .15s, border-color .15s; margin-bottom:10px; }
.social-btn:hover { background:var(--surface-alt); border-color:var(--primary-light); }
.social-btn svg { width:18px; height:18px; flex-shrink:0; }
#social-login { display:none; }
.alert-info { background:#e8f4fd; border:1px solid #bee3f8; color:#2b6cb0; border-radius:var(--radius); padding:12px 16px; font-size:.85rem; margin-bottom:12px; display:none; }
.alert-info.show { display:block; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand">
        <div class="brand-icon">GL</div>
        <span style="font-size:1.1rem;font-weight:700">GeneLink</span>
      </div>
      <h1>Portal de Pesquisa</h1>
      <p>Plataforma Científica de Pesquisa Genética</p>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login">Entrar</button>
      <button class="tab-btn" id="tab-register">Criar Conta</button>
    </div>

    <div class="auth-body">

      <!-- Login Social via Firebase -->
      <div id="social-login">
        <button class="social-btn" id="btn-google" onclick="loginComGoogle()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Entrar com Google
        </button>
        <button class="social-btn" id="btn-github" onclick="loginComGitHub()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" fill="#333"/>
          </svg>
          Entrar com GitHub
        </button>
        <div class="divider-line">ou continue com e-mail</div>
      </div>

      <!-- Aviso de verificação de e-mail -->
      <div id="verify-email-notice" class="alert-info">
        Enviamos um e-mail de verificação para você. Confirme seu e-mail antes de entrar.
      </div>

      <!-- Login com e-mail -->
      <div id="login-section">
        <div id="login-alert" class="alert"></div>
        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label class="form-label">Endereço de e-mail</label>
            <input type="email" id="login-email" class="form-control" placeholder="pesquisador@instituicao.edu.br" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" id="login-password" class="form-control" placeholder="Sua senha" autocomplete="current-password" required>
          </div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">Entrar</button>
        </form>
        <p style="text-align:center;font-size:.8rem;color:var(--text-muted);margin-top:16px">
          Não tem uma conta? <a href="#" onclick="document.getElementById('tab-register').click();return false">Crie agora</a>
        </p>
      </div>

      <!-- Cadastro -->
      <div id="register-section" style="display:none">
        <div id="register-alert" class="alert"></div>
        <form id="register-form" autocomplete="on">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">Nome Completo</label>
              <input type="text" id="reg-fullname" class="form-control" placeholder="João Silva" autocomplete="name">
            </div>
            <div class="form-group">
              <label class="form-label">Usuário <span style="color:var(--danger)">*</span></label>
              <input type="text" id="reg-username" class="form-control" placeholder="joaosilva" autocomplete="username" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Endereço de e-mail <span style="color:var(--danger)">*</span></label>
            <input type="email" id="reg-email" class="form-control" placeholder="pesquisador@instituicao.edu.br" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Senha <span style="color:var(--danger)">*</span></label>
            <input type="password" id="reg-password" class="form-control" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
          </div>
          <div class="form-group">
            <label class="form-label">Instituição</label>
            <input type="text" id="reg-institution" class="form-control" placeholder="Universidade de São Paulo">
          </div>
          <div class="form-group">
            <label class="form-label">Área de Pesquisa</label>
            <input type="text" id="reg-area" class="form-control" placeholder="Genômica, Biologia do Câncer…">
          </div>
          <button type="submit" id="register-btn" class="btn btn-accent btn-block btn-lg" style="margin-top:4px">Criar Conta</button>
        </form>
        <p style="text-align:center;font-size:.8rem;color:var(--text-muted);margin-top:16px">
          Já tem uma conta? <a href="#" onclick="document.getElementById('tab-login').click();return false">Entrar</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script type="module" src="/static/js/firebase_auth.js"></script>
<script src="/static/js/auth.js"></script>
<script>
  if (window.location.hash === "#cadastro") {
    setTimeout(() => document.getElementById("tab-register").click(), 50);
  }
</script>
</body>
</html>
