services:
  - type: web
    name: genelink-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --chdir artifacts/api-server app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/healthz
    autoDeploy: true
    plan: free
