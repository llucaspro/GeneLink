services:
  - type: web
    name: genelink-api
    runtime: python
    rootDir: GeneLink/genelink-audit
    buildCommand: pip install -r artifacts/api-server/requirements.txt
    startCommand: python -m gunicorn --bind 0.0.0.0:$PORT --workers 2 --chdir artifacts/api-server app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/healthz
    autoDeploy: true
    plan: free
